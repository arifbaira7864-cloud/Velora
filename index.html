<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velora</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP HEADER -->
  <header class="top-header">
    <div class="logo">Velora</div>

    <div class="top-tabs">
      <span class="active">For You</span>
      <span>Following</span>
    </div>
  </header>

  <!-- VIDEO FEED -->
  <main class="feed-container">

    <div class="video-card">
      <video autoplay muted loop>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      </video>

      <div class="video-overlay">
        <div class="creator-info">
          <h3>@velora_user</h3>
          <p>Beautiful colorful social app UI ✨</p>
        </div>

        <div class="side-actions">
          <button>❤️</button>
          <button>💬</button>
          <button>🔖</button>
          <button>↗️</button>
        </div>
      </div>
    </div>

  </main>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav">
    <button class="nav-active">🏠</button>
    <button>🔍</button>
    <button class="upload-btn">＋</button>
    <button>📥</button>
    <button>👤</button>
  </nav>

  <script src="app.js"></script>
</body>
  </html>
