<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Velora App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP -->
<div class="top">
  <h2>Velora</h2>
</div>

<!-- FEED -->
<div class="feed">

  <div class="video-card">
    <video autoplay muted loop>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4">
    </video>

    <div class="actions">
      <button onclick="likeVideo()">❤️</button>
      <button onclick="commentVideo()">💬</button>
      <button onclick="shareVideo()">🔗</button>
      <button onclick="followUser()">➕ Follow</button>
    </div>
  </div>

  <div class="video-card">
    <video autoplay muted loop>
      <source src="https://www.w3schools.com/html/movie.mp4">
    </video>

    <div class="actions">
      <button onclick="likeVideo()">❤️</button>
      <button onclick="commentVideo()">💬</button>
      <button onclick="shareVideo()">🔗</button>
      <button onclick="followUser()">➕ Follow</button>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="goHome()">🏠</button>
  <button onclick="goUpload()">➕</button>
  <button onclick="goInbox()">📥</button>
  <button onclick="goProfile()">👤</button>
</div>

<script src="app.js"></script>
</body>
</html>
